services:
  mysql:
    image: ${DOCUMENT_CENTER_MYSQL_IMAGE:-ccr.ccs.tencentyun.com/baron/doc-editor-mysql:8.0.33}
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-time-zone=+08:00
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-document_center}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: Asia/Shanghai
    volumes:
      - document-center-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  minio:
    image: ${DOCUMENT_CENTER_MINIO_IMAGE:-ccr.ccs.tencentyun.com/baron/doc-editor-minio:RELEASE.2025-09-07T16-13-09Z}
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      TZ: Asia/Shanghai
    volumes:
      - document-center-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    image: ${DOCUMENT_CENTER_BACKEND_IMAGE:-ccr.ccs.tencentyun.com/baron/doc-editor-backend:latest}
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DOCUMENT_CENTER_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-document_center}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DOCUMENT_CENTER_DATASOURCE_USERNAME: ${MYSQL_USERNAME:-root}
      DOCUMENT_CENTER_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DOCUMENT_CENTER_STORAGE_TYPE: s3
      DOCUMENT_CENTER_STORAGE_S3_ENDPOINT: http://minio:9000
      DOCUMENT_CENTER_STORAGE_S3_REGION: ${MINIO_REGION:-us-east-1}
      DOCUMENT_CENTER_STORAGE_S3_BUCKET: ${MINIO_BUCKET:-document-center}
      DOCUMENT_CENTER_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      DOCUMENT_CENTER_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      DOCUMENT_CENTER_STORAGE_S3_PATH_STYLE_ACCESS: "true"
      DOCUMENT_CENTER_STORAGE_PUBLIC_BASE_PATH: /api/v1/document-center/assets
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8080"

  frontend:
    image: ${DOCUMENT_CENTER_FRONTEND_IMAGE:-ccr.ccs.tencentyun.com/baron/doc-editor-frontend:latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${DOCUMENT_CENTER_HTTP_PORT:-8000}:80"

volumes:
  document-center-mysql-data:
  document-center-minio-data:
