server:
  port: 8080

spring:
  application:
    name: document-center-backend
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DOCUMENT_CENTER_DATASOURCE_URL:jdbc:mysql://localhost:13306/document_center?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DOCUMENT_CENTER_DATASOURCE_USERNAME:root}
    password: ${DOCUMENT_CENTER_DATASOURCE_PASSWORD:root}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.xxx.pai.mlp.man.documentcenter.domain.po
  configuration:
    map-underscore-to-camel-case: true

document-center:
  storage:
    type: ${DOCUMENT_CENTER_STORAGE_TYPE:s3}
    root-path: ${DOCUMENT_CENTER_STORAGE_ROOT_PATH:./data/document-center/objects}
    public-base-path: ${DOCUMENT_CENTER_STORAGE_PUBLIC_BASE_PATH:/api/v1/document-center/assets}
    s3:
      endpoint: ${DOCUMENT_CENTER_STORAGE_S3_ENDPOINT:http://localhost:19000}
      region: ${DOCUMENT_CENTER_STORAGE_S3_REGION:us-east-1}
      bucket: ${DOCUMENT_CENTER_STORAGE_S3_BUCKET:document-center}
      access-key: ${DOCUMENT_CENTER_STORAGE_S3_ACCESS_KEY:document-center}
      secret-key: ${DOCUMENT_CENTER_STORAGE_S3_SECRET_KEY:document-center-secret}
      path-style-access: ${DOCUMENT_CENTER_STORAGE_S3_PATH_STYLE_ACCESS:true}
